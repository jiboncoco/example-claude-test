<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Audit Log</h1>
      <div class="page-sub">System activity · all users · all modules</div>
    </div>
    <button class="btn btn-ghost">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
  </div>

  <div class="table-wrap">
    <div class="table-toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search" placeholder="Search by user, action or module…"/>
      </div>
    </div>
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Action</th>
          <th>Module</th>
          <th>Detail</th>
          <th>Timestamp</th>
          <th>IP Address</th>
        </tr>
      </thead>
      <tbody>
        @for (e of entries; track e.id) {
          <tr>
            <td class="cell-mono" style="font-size:11.5px; color:var(--text-faint);">{{ e.id }}</td>
            <td>
              <div style="display:flex; align-items:center; gap:8px;">
                <div class="avatar" style="width:26px; height:26px; font-size:10px; flex-basis:26px; background:var(--accent-purple);">{{ getInitials(e.user) }}</div>
                <span class="cell-strong">{{ e.user }}</span>
              </div>
            </td>
            <td>{{ e.action }}</td>
            <td><span [class]="moduleClass(e.module)">{{ e.module }}</span></td>
            <td class="cell-muted" style="font-size:12px; max-width:280px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ e.detail }}</td>
            <td class="cell-mono" style="font-size:12px; color:var(--text-muted);">{{ e.time }}</td>
            <td class="cell-mono" style="font-size:12px; color:var(--text-muted);">{{ e.ip }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
